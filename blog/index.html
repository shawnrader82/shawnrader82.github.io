<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Mobile American Notary & Apostilles</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/styles-v2.min.css">
  <link rel="preload" as="image" href="/images/services/notary-hero.webp" type="image/webp">

  <!-- Blog layout tweaks go HERE -->
  <style>
    .blog-more h2{margin:32px 0 18px}
    .blog-card.blog-card--horizontal{padding:22px 20px}
    .blog-card.blog-card--horizontal+.blog-card.blog-card--horizontal{margin-top:18px}
  </style>
<!-- Google Tag Manager -->
<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-KWBRTN9M');</script>
<!-- End Google Tag Manager -->
</head>

<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KWBRTN9M"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
  <div id="header-placeholder"></div>
  <script src="/header.min.js" defer></script>

  <section class="blog-hero">
    <div class="blog-hero-bg"></div>
    <div class="blog-hero-inner">
      <h1>Blog</h1>
      <p>Helpful guides on notary, apostille, and document services in Los Angeles</p>
    </div>
  </section>

  <div class="blog-page-wrap">
    <section class="blog-shell">

      <div id="featured-post"></div>

      <section class="blog-more">
        <h2>More articles</h2>
        <div id="more-posts"></div>
      </section>

    </section>
  </div>

  <!-- Ghost Content API script -->
  <script src="https://cdn.jsdelivr.net/npm/@tryghost/content-api@1.11.27/umd/content-api.min.js"></script>
  <script>
    const api = new GhostContentAPI({
      url: 'https://blog.mobileamericannotary.com',
      key: '0c679b6626cb02488b198db5cb',
      version: 'v5'
    });

    api.posts
      .browse({ limit: 10, include: 'tags,authors' })
      .then(posts => {
        if (!posts || posts.length === 0) {
          document.getElementById('featured-post').innerHTML =
            '<p>No articles have been published yet. Please check back soon.</p>';
          return;
        }

        const featured = posts[0];
        const others = posts.slice(1);

        renderFeaturedPost(featured);
        renderMorePosts(others);
      })
      .catch(err => {
        console.error(err);
        document.getElementById('featured-post').innerHTML =
          '<p>Unable to load blog posts right now.</p>';
      });

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
    }

    function renderFeaturedPost(post) {
      const container = document.getElementById('featured-post');
      if (!container) return;

      const imageHtml = post.feature_image
        ? `<div class="blog-card__image">
             <img loading="lazy" src="${post.feature_image}" alt="${post.title}">
           </div>`
        : '';

      const date = formatDate(post.published_at);

      container.innerHTML = `
        <div class="blog-card blog-card--horizontal blog-card--white">
          ${imageHtml}
          <div class="blog-card__content">
            <h2><a href="${post.url}">${post.title}</a></h2>
            <div class="date">${date}</div>
            <div class="excerpt">
              ${post.excerpt}
            </div>
            <a href="${post.url}" class="read-more">Read More →</a>
          </div>
        </div>
      `;
    }

function renderMorePosts(posts) {
  const container = document.getElementById('more-posts');
  if (!container) return;

  if (!posts.length) {
    container.innerHTML = '<p>No older articles yet.</p>';
    return;
  }

  container.innerHTML = posts.map((post, index) => {
    const date = formatDate(post.published_at);
    const bgClass = index % 2 === 0 ? 'blog-card--white' : 'blog-card--gray';
    const imageHtml = post.feature_image
      ? `<div class="blog-card__image">
           <img loading="lazy" src="${post.feature_image}" alt="${post.title}">
         </div>`
      : '';

    return `
      <article class="blog-card blog-card--horizontal ${bgClass}">
        ${imageHtml}
        <div class="blog-card__content">
          <h2><a href="${post.url}">${post.title}</a></h2>
          <div class="date">${date}</div>
          <p class="excerpt">${post.excerpt}</p>
          <a class="read-more" href="${post.url}">Read more →</a>
        </div>
      </article>
    `;
  }).join('');
}

  </script>


  <div id="footer-placeholder"></div>
  <script src="/footer.min.js" defer></script>
</body>
</html>
